name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Removemos o serviço do PostgreSQL para o ambiente ser igual ao teu local (SQLite in-memory)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Igualado à tua versão local!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # (O pytest e pytest-cov já estão no requirements.txt, não é preciso instalar 2 vezes)

      - name: Run tests with coverage
        env:
          JWT_SECRET_KEY: test-secret-key
          FLASK_ENV: testing
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # Agora corremos a pasta 'tests/' inteira e geramos o .xml que o Codecov adora
          pytest tests/ --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false